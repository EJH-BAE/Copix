# fly launch — https://fly.io/docs
app = "copix-cloud"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[env]
  BACKEND = "ollama"
  DEFAULT_MODEL = "gpt-oss:20b"
  RATE_LIMIT_PER_MIN = "30"
